name: Privacy Policy Drift Check

on:
  schedule:
    - cron: '0 6 * * *'  # Daily at 6am UTC
  workflow_dispatch:
    inputs:
      target_repo:
        description: 'Target repository URL to check'
        required: true
        type: string
      policy_path:
        description: 'Path to privacy policy (relative to target root)'
        required: true
        default: 'PRIVACY.md'
        type: string

permissions:
  contents: read
  issues: write

jobs:
  drift-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout auditor repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -e ".[auditor]"

      - name: Clone target repository
        run: |
          if [[ "${{ inputs.target_repo }}" == http* ]]; then
            git clone "${{ inputs.target_repo }}" /tmp/audit-target
            TARGET_PATH="/tmp/audit-target"
          else
            TARGET_PATH="${{ inputs.target_repo }}"
          fi
          echo "TARGET_PATH=$TARGET_PATH" >> $GITHUB_ENV

      - name: Check for drift
        id: drift
        run: |
          RESULT=$(mvs audit drift-check \
            --target "$TARGET_PATH" \
            --policy "$TARGET_PATH/${{ inputs.policy_path || 'PRIVACY.md' }}" \
            --json)
          echo "drift_result=$RESULT" >> $GITHUB_OUTPUT
          echo "$RESULT" | python3 -c "import sys,json; r=json.load(sys.stdin); sys.exit(1 if r['has_drift'] else 0)" || echo "DRIFT_DETECTED=true" >> $GITHUB_ENV

      - name: Create re-audit issue
        if: env.DRIFT_DETECTED == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          EXISTING=$(gh issue list --label "privacy-drift" --state open --json number --jq '.[0].number // empty')
          if [ -z "$EXISTING" ]; then
            gh issue create \
              --title "Privacy audit drift detected — re-audit required" \
              --label "privacy-drift,privacy-audit" \
              --body "$(cat <<BODY
          ## Privacy Audit Drift Detected

          The privacy policy or code has changed since the last audit.

          $(echo '${{ steps.drift.outputs.drift_result }}' | python3 -c "import sys,json; r=json.load(sys.stdin); print(r['details'])")

          ### Action Required
          Run a new privacy audit:
          \`\`\`
          gh workflow run privacy-audit.yml -f target_repo=... -f policy_path=...
          \`\`\`

          ---
          *Generated by privacy drift check*
          BODY
          )"
          else
            gh issue comment "$EXISTING" --body "Drift still detected as of $(date -u +%Y-%m-%d). Re-audit pending."
          fi
